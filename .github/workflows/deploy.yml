name: Deploy to Lightsail

on:
  push:
    branches: [main]
  workflow_dispatch:

# main에 동시에 여러 push 들어와도 deploy는 직렬
concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: SSH and run deploy.sh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LIGHTSAIL_HOST }}
          username: ec2-user
          key: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          port: 22
          command_timeout: 8m
          script_stop: true
          script: |
            bash /home/ec2-user/hantijae-bookstore/scripts/deploy.sh
